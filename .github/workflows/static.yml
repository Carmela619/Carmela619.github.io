<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmela's Rapidline</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sacramento&display=swap');

        body {
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Sacramento', cursive;
            color: #fff;
            text-align: center;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            background-color: #000; /* Fallback color */
        }

        /* --- FALLING STAR STYLE --- */
        .star {
            position: fixed;
            top: -10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #ff69b4;
            pointer-events: none;
            z-index: 0;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        /* --- INTENSE SPARKLE HEADER --- */
        header {
            padding: 60px 20px;
            background: rgba(255, 20, 147, 0.7);
            font-size: 5.5em;
            font-weight: bold;
            position: relative;
            z-index: 10;
            background: linear-gradient(
                to right, 
                #ff69b4 0%, #fff 10%, #ff69b4 20%, #fff 30%, 
                #ff1493 40%, #fff 50%, #ff69b4 60%, #fff 70%, 
                #ff1493 80%, #fff 90%, #ff69b4 100%
            );
            background-size: 50% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: intense-sparkle 1.5s linear infinite;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }

        @keyframes intense-sparkle {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .sparkle-sub {
            display: block;
            font-size: 0.35em;
            -webkit-text-fill-color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 15px #ff1493, 0 0 30px #ff1493;
            letter-spacing: 5px;
            margin-top: -15px;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* --- CONTENT STYLING --- */
        nav {
            display: flex;
            justify-content: center;
            background-color: rgba(255, 133, 193, 0.9);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a { text-decoration: none; color: white; margin: 0 20px; font-size: 1.8em; }

        .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 5; }

        section { padding: 60px 20px; background: rgba(0, 0, 0, 0.6); margin: 20px 0; border-radius: 20px; }

        .ride-attraction {
            border: 5px solid #fff;
            box-shadow: 0 0 30px #ff1493;
            background: linear-gradient(45deg, rgba(255, 20, 147, 0.6), rgba(0,0,0,0.8));
            border-radius: 40px;
        }

        .btn {
            padding: 15px 40px;
            background: #fff;
            color: #ff1493;
            border: none;
            border-radius: 50px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px #fff;
            transition: 0.2s;
        }

        .btn:hover { transform: scale(1.1); box-shadow: 0 0 40px #fff; }

        .product-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #fff;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        Carmela's Rapidline
        <span class="sparkle-sub">
    </header>

    <nav>
        <a href="#fast-rides">Fast Rides</a>
        <a href="#services">Services</a>
        <a href="#shop">Shop</a>
    </nav>

    <main class="container">
        <section id="fast-rides" class="ride-attraction">
            <h2 style="font-size: 4em; margin: 0;">Fast Ride Service ⚡</h2>
            <p style="font-size: 1.8em;">Need to be there in flash. Call The ultimate speed & attraction.</p>
            <button class="btn">BOOK NOW</button>
        </section>

        <section id="services">
            <h2>Personal Services</h2>
            <div class="product-card">
                <h3>One-on-One Consultation</h3>
                <button class="btn" style="font-size: 1em;">Details</button>
            </div>
        </section>

        <section id="shop">
            <h2>Official Shop</h2>
            <div class="product-card">
                <h3>Rapidline Signature Hoodie</h3>
                <button class="btn" style="font-size: 1em;">Buy Now</button>
            </div>
        </section>
    </main>

    <script>
        // Falling Star Animation Script
        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            
            // Randomize position and size
            const size = Math.random() * 4 + 2 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            
            // Randomize speed
            const duration = Math.random() * 3 + 2 + 's';
            star.style.animationDuration = duration;

            document.body.appendChild(star);

            // Remove star after it falls
            setTimeout(() => {
                star.remove();
            }, 5000);
        }

        // Generate stars every 300ms
        setInterval(createStar, 300);
    </script>
</body>
</html>
